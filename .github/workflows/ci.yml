name: CI

on:
  push:
    branches: [main]
  pull_request:

# The suite runs against a LOCAL embedded Postgres (scripts/with-test-db.ts) —
# no service container, no external DB. Tests never touch the prod/dev Neon DB.
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Installs deps and runs approved build scripts (embedded-postgres binary
      # hydration is allowlisted in pnpm-workspace.yaml).
      - run: pnpm install --frozen-lockfile

      - name: Typecheck + lint
        run: |
          pnpm typecheck
          pnpm lint

      - name: Unit tests (local embedded Postgres)
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (local embedded Postgres)
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
